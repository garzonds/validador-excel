<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Acceso — Validador de Excel</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@600;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0f14; --surface: #151820; --border: #252a35;
      --accent: #00e5a0; --danger: #ff4d6d;
      --text: #e8eaf0; --muted: #5a6278; --radius: 14px;
    }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh; display: flex;
      align-items: center; justify-content: center; padding: 2rem;
    }
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 48px 48px; opacity: .35; pointer-events: none;
    }
    body::after {
      content: ''; position: fixed;
      width: 600px; height: 600px; border-radius: 50%;
      background: radial-gradient(circle, rgba(0,229,160,.07) 0%, transparent 70%);
      top: -100px; left: 50%; transform: translateX(-50%); pointer-events: none;
    }
    .card {
      position: relative; width: 100%; max-width: 400px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 2.5rem;
      box-shadow: 0 0 0 1px rgba(0,229,160,.04), 0 32px 64px rgba(0,0,0,.5);
      animation: fadeUp .5s ease both;
    }
    @keyframes fadeUp {
      from { opacity:0; transform: translateY(24px); }
      to   { opacity:1; transform: translateY(0); }
    }
    .lock { font-size: 2.5rem; margin-bottom: 1rem; display: block; text-align: center; }
    h1 {
      font-family: 'Syne', sans-serif; font-size: 1.6rem;
      font-weight: 800; text-align: center; margin-bottom: .4rem;
    }
    h1 span { color: var(--accent); }
    .subtitle { font-size: .78rem; color: var(--muted); text-align: center; margin-bottom: 2rem; }
    label { display: block; font-size: .72rem; color: var(--muted); letter-spacing: .08em; text-transform: uppercase; margin-bottom: .5rem; }
    input[type="password"] {
      width: 100%; background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; padding: .75rem 1rem;
      color: var(--text); font-family: 'DM Mono', monospace; font-size: .9rem;
      outline: none; transition: border-color .2s;
    }
    input[type="password"]:focus { border-color: var(--accent); }
    .btn {
      display: flex; align-items: center; justify-content: center;
      width: 100%; padding: .85rem; border-radius: 8px;
      font-family: 'Syne', sans-serif; font-weight: 600; font-size: .9rem;
      cursor: pointer; border: none; background: var(--accent);
      color: #0d0f14; margin-top: 1rem; transition: all .2s;
    }
    .btn:hover { background: #00ffb2; box-shadow: 0 0 24px rgba(0,229,160,.4); }
    .error {
      margin-top: 1rem; padding: .75rem 1rem; border-radius: 8px;
      background: rgba(255,77,109,.08); border: 1px solid rgba(255,77,109,.3);
      color: var(--danger); font-size: .78rem; text-align: center;
    }
  </style>
</head>
<body>
<div class="card">
  <span class="lock">🔒</span>
  <h1>Acceso <span>Privado</span></h1>
  <p class="subtitle">Ingresa la contraseña para continuar</p>

  <form method="POST" action="/login">
    <label for="password">Contraseña</label>
    <input type="password" id="password" name="password" placeholder="••••••••" autofocus/>
    <button type="submit" class="btn">Entrar →</button>
  </form>

  {% if error %}
  <div class="error">❌ {{ error }}</div>
  {% endif %}
</div>
</body>
</html>
